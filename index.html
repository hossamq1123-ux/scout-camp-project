<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النظام الإلكتروني | معسكر مدرسة الابتدائية 36</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // إجبار المتصفح على البقاء في الأعلى عند التحميل
        window.onload = function() {
            setTimeout(function() { window.scrollTo(0, 0); }, 100);
        };
        tailwind.config = { darkMode: 'class' };
    </script>
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
        .ticker-wrap { overflow: hidden; position: relative; white-space: nowrap; display: flex; align-items: center; }
        .ticker-content { display: inline-flex; animation: ticker 35s linear infinite; }
        .ticker-content:hover { animation-play-state: paused; cursor: default; }
        @keyframes ticker { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
        /* تحسين عرض الهيكل في الجوال */
        @media (max-width: 768px) { .tree-wrapper { min-width: 800px; } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-300 pt-[180px] lg:pt-[150px]">

    <header class="fixed top-0 left-0 right-0 z-50 shadow-xl bg-white dark:bg-slate-950">
        <nav class="border-b border-amber-500/30 py-4 px-6 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="assets/logo-scouts.png" class="w-10 h-10 object-contain">
                <h2 class="text-xs font-black text-indigo-950 dark:text-amber-400">معسكر الابتدائية 36</h2>
            </div>
            <div class="flex gap-4 overflow-x-auto scrollbar-none text-[12px] font-black text-slate-800 dark:text-slate-200">
                <a href="#hero" class="shrink-0">الرئيسية</a>
                <a href="#leaders" class="shrink-0">الهيكل التنظيمي</a>
                <a href="#guide" class="shrink-0">الحقيبة</a>
                <a href="#schedule" class="shrink-0">البرنامج</a>
                <a href="#prayers" class="shrink-0">الصلاة</a>
            </div>
            <button onclick="toggleTheme()" class="p-2 bg-slate-100 dark:bg-slate-800 rounded-lg">
                <i id="theme-icon" data-lucide="moon" class="w-4 h-4 text-indigo-600 dark:text-amber-400"></i>
            </button>
        </nav>
        <div class="bg-indigo-900 h-10 flex items-center overflow-hidden">
            <div class="bg-amber-500 px-4 text-xs font-black shrink-0">أخبار المعسكر</div>
            <div class="ticker-wrap flex-1 text-white text-xs font-bold">
                <div class="ticker-content flex gap-12 px-4">
                    <span>اكتمال جاهزية المعسكر بنسبة 100%.</span>
                    <span>الاجتماع التعريفي اليوم بعد المغرب.</span>
                </div>
            </div>
        </div>
    </header>

    <section id="hero" class="h-[60vh] bg-cover bg-top bg-no-repeat flex items-center justify-center" style="background-image: linear-gradient(to bottom, rgba(241, 245, 249, 0.5), rgba(15, 23, 42, 0.9)), url('assets/camp-identity.jpg');">
        <h1 class="text-3xl md:text-5xl font-black text-white text-center px-4">الكشافة السعودية في خدمة ضيوف الرحمن</h1>
    </section>

    <section id="leaders" class="py-20 overflow-x-auto scrollbar-none">
        <div class="container mx-auto tree-wrapper">
            <div class="flex flex-col items-center">
                <div class="bg-indigo-900 p-4 rounded-xl text-center w-64 text-white font-bold">
                    مدير الفريق: ماجد بن محمد آل خيرات
                </div>
                <div class="grid grid-cols-5 gap-4 mt-10">
                    <div class="bg-white dark:bg-slate-800 p-3 rounded-lg border dark:border-slate-700 text-center text-[10px] font-bold">
                        قائد البرامج: عبدالهادي الشهري
                    </div>
                    <div class="bg-white dark:bg-slate-800 p-3 rounded-lg border dark:border-slate-700 text-center text-[10px] font-bold">
                        قائد الساحة والدعم: راجس إبراهيم الدوسري
                    </div>
                    </div>
            </div>
        </div>
    </section>

    <script>
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            lucide.createIcons();
        }
        lucide.createIcons();
    </script>
</body>
</html>
